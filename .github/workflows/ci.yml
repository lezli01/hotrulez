name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Gradle Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      # The IntelliJ Platform's extracted IDE lives in an "immutable workspace" under
      # ~/.gradle/caches/<ver>/transforms. When gradle/actions restores it from the
      # Actions cache, Gradle's integrity check intermittently fails with "the contents
      # of the immutable workspace ... have been modified", breaking
      # :intellijPlatformTestClasspath resolution. gradle-home-cache-excludes globs do
      # NOT reliably keep this path out of the cache, so we delete it after the restore.
      # Gradle re-extracts it from the still-cached download -- cheap and, unlike a
      # restored transform, never corrupt. The dependency caches are kept intact.
      - name: Purge cached IntelliJ Platform IDE transform
        run: rm -rf ~/.gradle/caches/*/transforms ~/.gradle/caches/transforms-*

      - name: Run tests
        run: ./gradlew test --no-daemon

  verify:
    name: Plugin Verifier
    runs-on: ubuntu-latest

    steps:
      # verifyPlugin downloads full IDE builds via the JetBrains Plugin Verifier;
      # free up the runner disk first so the downloads and Gradle caches both fit.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      # See the test job: the restored IntelliJ Platform IDE transform intermittently
      # fails Gradle's immutable-workspace integrity check, so delete it after restore
      # and let Gradle re-extract it fresh from the still-cached download.
      - name: Purge cached IntelliJ Platform IDE transform
        run: rm -rf ~/.gradle/caches/*/transforms ~/.gradle/caches/transforms-*

      - name: Verify plugin
        run: ./gradlew verifyPlugin --no-daemon
