name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Gradle Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          # Do not cache the IntelliJ Platform's extracted IDE distribution. Gradle
          # stores it as an immutable workspace under caches/<version>/transforms, and
          # restoring it from the Actions cache intermittently trips Gradle's integrity
          # check ("immutable workspace ... has been modified"). Re-extracting it each
          # run (from the still-cached download) is cheap and reliable.
          gradle-home-cache-excludes: |
            caches/*/transforms

      - name: Run tests
        run: ./gradlew test --no-daemon
