name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v6

      - name: Set up JDK 21
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          # This workflow shares a Gradle cache key with ci.yml (the key is derived
          # from the Gradle build files, not the workflow). Exclude the IntelliJ
          # Platform's extracted IDE distribution here too, so a release run never
          # writes a "transforms" workspace into the shared cache that a later PR's
          # CI would restore and trip Gradle's immutable-workspace integrity check.
          # The "/**" line excludes the directory CONTENTS (glob "*" does not cross "/").
          gradle-home-cache-excludes: |
            caches/*/transforms
            caches/*/transforms/**

      - name: Build plugin distribution
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: ./gradlew buildPlugin --no-daemon

      - name: Upload plugin distribution to release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" build/distributions/*.zip --clobber
