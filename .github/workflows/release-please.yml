name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    # Exposed at job level so the publish step's `if` can read it. While the
    # PUBLISH_TOKEN secret is absent (the manual-first phase, before the first
    # upload is approved) this is an empty string and the publish step is skipped,
    # so releases keep working without touching the Marketplace.
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # verifyPlugin (below) downloads full IDE builds; free up runner disk first.
      - name: Free disk space
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      - name: Checkout
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v7

      - name: Set up JDK 21
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      # See ci.yml: gradle/actions shares a cache key across workflows, and the
      # IntelliJ Platform IDE transform restored from that cache intermittently fails
      # Gradle's immutable-workspace integrity check. Delete it after restore so Gradle
      # re-extracts it fresh; this also keeps a release run from caching a transform
      # that a later PR's CI would restore.
      - name: Purge cached IntelliJ Platform IDE transform
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: rm -rf ~/.gradle/caches/*/transforms ~/.gradle/caches/transforms-*

      - name: Build plugin distribution
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: ./gradlew buildPlugin --no-daemon

      # Gate the release on the JetBrains Plugin Verifier before anything is published.
      - name: Verify plugin
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: ./gradlew verifyPlugin --no-daemon

      - name: Upload plugin distribution to release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" build/distributions/*.zip --clobber

      # Publish to the JetBrains Marketplace. Dormant until the PUBLISH_TOKEN secret
      # exists (added after the manual first upload clears moderation), so releases
      # keep working during the manual-first phase. publishPlugin reads PUBLISH_TOKEN
      # from the environment (see build.gradle.kts intellijPlatform.publishing).
      - name: Publish to JetBrains Marketplace
        if: ${{ steps.release.outputs.release_created == 'true' && env.PUBLISH_TOKEN != '' }}
        run: ./gradlew publishPlugin --no-daemon
