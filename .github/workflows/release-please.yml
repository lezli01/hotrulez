name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v7

      - name: Set up JDK 21
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      # See ci.yml: gradle/actions shares a cache key across workflows, and the
      # IntelliJ Platform IDE transform restored from that cache intermittently fails
      # Gradle's immutable-workspace integrity check. Delete it after restore so Gradle
      # re-extracts it fresh; this also keeps a release run from caching a transform
      # that a later PR's CI would restore.
      - name: Purge cached IntelliJ Platform IDE transform
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: rm -rf ~/.gradle/caches/*/transforms ~/.gradle/caches/transforms-*

      - name: Build plugin distribution
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: ./gradlew buildPlugin --no-daemon

      - name: Upload plugin distribution to release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" build/distributions/*.zip --clobber
